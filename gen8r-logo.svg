<svg width="240" height="64" viewBox="0 0 240 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Gen8r wordmark — clean white version for dark backgrounds.
       Use on the gen8r.ai site, business cards, email signatures.
       Cyan→gold gradient on the "8" matches the favicon + site accent. -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ffb800"/>
    </linearGradient>
  </defs>
  <text x="0" y="48" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-weight="400" font-size="56" fill="#ffffff">Gen<tspan fill="url(#g)">8</tspan>r</text>
</svg>
